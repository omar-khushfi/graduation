{% load static %}
<!DOCTYPE html>
<html lang="en" dir="ltr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Modern Multilingual Word List</title>
        <link rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
       <link rel="stylesheet" href="{% static 'folder.css' %}">
    </head>
    <body>
        <div class="topnav">
            <div class="left-menu">
                <a href="#home">Download vocabulary</a>
                <a href="#categories">Exam</a>
            </div>
            <div class="search-container-all">
                <input type="text" placeholder="Search for ...">
                <button type="submit">Search</button>
            </div>

            <div class="dark-wight">
                <input type="checkbox" class="checkbox" id="checkbox">
                <label for="checkbox" class="checkbox-label">
                    <i class="fas fa-moon"></i>
                    <i class="fas fa-sun"></i>
                    <span class="ball"></span>
                </label>
            </div>

            <div class="profile">
                <a href="#about">My Profile</a>
            </div>
            <button class="open-btn" onclick="openNav()">&#9776;</button>
        </div>

        <div class="side-menu" id="sideMenu">
            <a href="#home">Download vocabulary</a>
            <a href="#categories">Exam</a>
            <a href="#about">My Profile</a>
            <!-- إضافة "My Profile" للقائمة الجانبية -->
        </div>

        <div class="container">
           
          
            <table class="word-table">
                <thead>
                    <tr>
                     
                       {% for la in languages %}
                       <th>{{la.type}}</th>
                       {% endfor %}
                       <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                   <form method="post">
                    {% csrf_token %}
                       {% for translat in translates %}
                       <td>
                          <td > <input type="text" value="{{translat.translation}}" name="translate_{{translat.id}}"> </td>
                        </td>
                          {% endfor %}
                          <td data-label="Actions" class="action-buttons">
                              <button class="delete">save</button>
                          </td>
                        </form>
                    <!-- إضافة المزيد من الصفوف حسب الحاجة -->
                </tbody>
            </table>
        </div>

        <script>
        function openNav() {
            document.getElementById("sideMenu").style.display = "block";
        }
        const wordTableRows = document.querySelectorAll('.word-table tbody tr');

        document.querySelectorAll('.pronounce-icon').forEach(icon => {
            icon.addEventListener('click', function() {
           
            });
        });
         function playAudio(audioUrl) {
       
        const audio = new Audio(audioUrl);
        
        audio.play();
    }

        function openNav() {
            if( document.getElementById("sideMenu").style.display == "block")
             document.getElementById("sideMenu").style.display = "none";
            else
             document.getElementById("sideMenu").style.display = "block";
        }
    </script>
    </body>
</html>
